name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.89"
          components: rustfmt, clippy
      - name: Install JJ
        run: |
          curl -L https://github.com/jj-vcs/jj/releases/download/v0.40.0/jj-v0.40.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/jj.tar.gz
          mkdir -p /tmp/jj
          tar -xzf /tmp/jj.tar.gz -C /tmp/jj
          sudo install -m 0755 "$(find /tmp/jj -type f -name jj | head -n 1)" /usr/local/bin/jj
          jj --version
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --all-features
      - name: Benchmark compile smoke
        run: cargo bench --bench sync_transaction_classes -- --test
